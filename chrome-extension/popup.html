<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header svg {
      width: 20px;
      height: 20px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #2a2a3e;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status-dot.active { background: #66bb6a; }
    .status-dot.inactive { background: #666; }
    .status-dot.connected { background: #346bea; }
    .status-dot.error { background: #e53935; }
    .status-stack {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-meta {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      line-height: 1.4;
      white-space: pre-line;
    }
    .refresh-btn {
      margin-left: auto;
      border: none;
      background: transparent;
      color: #9bb7ff;
      font-size: 11px;
      cursor: pointer;
    }
    .refresh-btn:hover { color: #c4d5ff; }
    .toggle-btn {
      width: 100%;
      padding: 10px;
      background: #346bea;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      margin-bottom: 12px;
    }
    .toggle-btn:hover { background: #2a5bd6; }
    .toggle-btn.active { background: #e53935; }
    .toggle-btn.active:hover { background: #c62828; }
    .shortcut {
      text-align: center;
      font-size: 11px;
      color: #666;
    }
    kbd {
      background: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      color: #aaa;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .settings label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 6px 8px;
      background: #2a2a3e;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-size: 11px;
      outline: none;
    }
    .settings input:focus { border-color: #346bea; }
    .settings .hint {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#346bea" stroke-width="2">
      <circle cx="12" cy="12" r="7"/>
      <line x1="12" y1="1" x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="1" y1="12" x2="5" y2="12"/>
      <line x1="19" y1="12" x2="23" y2="12"/>
    </svg>
    <h1>Click-to-Inspect</h1>
  </div>

  <div class="status-stack">
    <div class="status">
      <div class="status-dot" id="serverDot"></div>
      <span id="serverText">Checking server...</span>
      <button class="refresh-btn" id="refreshHealthBtn">Refresh</button>
    </div>
    <div class="status-meta" id="serverMeta">Server URL: http://localhost:3847</div>

    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Inactive</span>
    </div>
  </div>

  <button class="toggle-btn" id="toggleBtn">Activate Inspector</button>

  <div class="shortcut">
    Keyboard shortcut: <kbd>Alt</kbd> + <kbd>Shift</kbd> + <kbd>X</kbd>
  </div>

  <div class="settings">
    <label for="projectRoot">Project root path</label>
    <input type="text" id="projectRoot" placeholder="/Users/you/project" />
    <div class="hint">Where native-mode request files will be written</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
