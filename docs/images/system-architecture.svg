<svg width="1600" height="1120" viewBox="0 0 1600 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="molly" x1="420" y1="325" x2="1180" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="entryA" x1="110" y1="150" x2="455" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFDF5"/>
