      .line { stroke: #475569; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .softline { stroke: #64748B; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 7 10; }
