[supervisord]
nodaemon=true
loglevel=info
user=root

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:opencode]
command=opencode serve --port 4096 --hostname 0.0.0.0
directory=/workspace/msm-portal
autostart=true
autorestart=true
stdout_logfile=/var/log/opencode.log
stderr_logfile=/var/log/opencode.err.log
priority=10

[program:vite]
command=/workspace/scripts/start-vite.sh
directory=/workspace/msm-portal/js/msm-portal-web
autostart=false
autorestart=true
stdout_logfile=/var/log/vite.log
stderr_logfile=/var/log/vite.err.log
priority=20
startsecs=5
startretries=3
